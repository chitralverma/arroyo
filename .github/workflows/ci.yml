name: CI

on: [push, pull_request]

env:
  # Versions
  REFINERY_VERSION: "0.8.14"
  PROTOC_VERSION: "27.3"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  PNPM_VERSION: "9.7.1"

  # Postgres related
  REFINERY_CONFIG: postgres://arroyo:arroyo@localhost:5432/arroyo
  POSTGRES_USER: arroyo
  POSTGRES_PASSWORD: arroyo
  POSTGRES_DB: arroyo
  POSTGRES_HOST: localhost

  RUST_CACHE_PREFIX_KEY: "linux-x86_64"

jobs:
  # Lint UI (prettier/ pnpm checks)
  lint-console:
    name: lint-console (webui)
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js ${{ env.NODE_VERSION }} with caching
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Run prettier
        working-directory: webui
        run: |
          pnpm install --frozen-lockfile --strict-peer-dependencies
          pnpm check

  # Lint Rust (check formatting)
  lint-rust:
    name: lint-rust (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.RUST_CACHE_PREFIX_KEY }}

      - name: Check Formatting
        run: cargo fmt -- --check


  # Build UI (produces webui artifact)
  build-console:
    name: build-console (webui artifact)
    runs-on: ubuntu-latest
    needs: [lint-console]
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js ${{ env.NODE_VERSION }} with caching
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Build console (webui)
        working-directory: webui
        run: |
          pnpm install --frozen-lockfile --strict-peer-dependencies
          pnpm build

      - name: Install OpenAPI Generator (global)
        working-directory: crates/arroyo-openapi
        run: |
          pnpm install -g @openapitools/openapi-generator-cli
          openapi-generator-cli version || true

      - name: Upload webui build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webui-build
          path: webui/dist
          if-no-files-found: error
